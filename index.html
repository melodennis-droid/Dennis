<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store - Nova Coleção</title>
    <style>
        /* 1. VARIÁVEIS CSS */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --header-bg: #000000;
            --element-bg: #111111;
            --border-color: #222222;
            --btn-inactive: #222222;
            --btn-hover: #333333;
            --accent-color: #ff3b3b;
            --accent-hover: #d32f2f;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --header-shadow: rgba(0, 0, 0, 0.8);
            --cart-bg: #1a1a1a;
        }

        body.light-mode {
            --bg-color: #f4f4f5;
            --text-color: #1a1a1a;
            --header-bg: #ffffff;
            --element-bg: #ffffff;
            --border-color: #dddddd;
            --btn-inactive: #e0e0e0;
            --btn-hover: #cccccc;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --header-shadow: rgba(0, 0, 0, 0.1);
            --cart-bg: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        header {
            background-color: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--header-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 { font-size: 22px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }

        .header-actions { display: flex; align-items: center; gap: 15px; }

        #themeToggle, #cartToggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            transition: transform 0.3s;
            position: relative;
        }

        /* Contador de itens no carrinho */
        #cartCount {
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--accent-color);
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 50%;
            font-weight: bold;
        }

        .login-btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        nav { display: flex; gap: 10px; margin-top: 10px; justify-content: center; padding: 10px; }
        nav button {
            background: var(--btn-inactive);
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 15px;
            color: var(--text-color);
            border-radius: 20px;
            font-weight: 600;
        }
        nav button.active { background-color: var(--accent-color); color: white; }

        .search-bar { margin: 25px auto; text-align: center; padding: 0 20px; }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 12px 25px;
            border-radius: 30px;
            background-color: var(--element-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            outline: none;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 20px 5%;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--element-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            border: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        .product-card img { width: 100%; height: 250px; object-fit: cover; }
        .product-card h3 { padding: 10px; font-size: 16px; }
        .product-card .price { color: var(--accent-color); font-weight: bold; font-size: 18px; margin-bottom: 10px; display: block;}

        .add-to-cart {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .add-to-cart:hover { background: var(--accent-hover); }

        /* --- ESTILO DO CARRINHO (SIDEBAR) --- */
        #cartSidebar {
            position: fixed;
            top: 0;
            right: -350px; /* Escondido */
            width: 320px;
            height: 100%;
            background: var(--cart-bg);
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            z-index: 2000;
            transition: 0.4s ease;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #cartSidebar.open { right: 0; }

        .cart-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .close-cart { background: none; border: none; font-size: 24px; color: var(--text-color); cursor: pointer; }

        #cartItems { flex-grow: 1; overflow-y: auto; margin: 20px 0; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; }
        .cart-item-info { flex-grow: 1; margin-left: 10px; }
        .remove-item { color: var(--accent-color); cursor: pointer; background: none; border: none; font-size: 12px; }

        .cart-footer { border-top: 1px solid var(--border-color); padding-top: 15px; }
        .total-price { font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 15px; }
        .checkout-btn { background: #28a745; color: white; border: none; width: 100%; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; }

        .category { display: none; }
        .category.active { display: contents; }

        @media(max-width: 600px) {
            .products { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .product-card img { height: 150px; }
            #cartSidebar { width: 100%; right: -100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Fashion Store</h1>
    <div class="header-actions">
        <button id="themeToggle" title="Trocar Tema">☀️</button>
        <button id="cartToggle" title="Ver Carrinho">
            🛒 <span id="cartCount">0</span>
        </button>
        <a href="#" class="login-btn">Conta</a>
    </div>
</header>

<nav>
    <button class="tab-btn active" data-category="shorts">Shorts</button>
    <button class="tab-btn" data-category="calcas">Calças</button>
    <button class="tab-btn" data-category="camisetas">Camisetas</button>
    <button class="tab-btn" data-category="acessorios">Acessórios</button>
</nav>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar produto...">
</div>

<aside id="cartSidebar">
    <div class="cart-header">
        <h2>Seu Carrinho</h2>
        <button class="close-cart">&times;</button>
    </div>
    <div id="cartItems">
        </div>
    <div class="cart-footer">
        <div class="total-price">
            <span>Total:</span>
            <span id="cartTotal">R$ 0,00</span>
        </div>
        <button class="checkout-btn">Finalizar Compra</button>
    </div>
</aside>

<main class="products">
    <div class="category shorts active">
        <div class="product-card" data-name="Jorts" data-price="139.90">
            <img src="https://img.lojasrenner.com.br/item/928167705/original/5.jpg" alt="Short Jeans">
            <h3>Jorts</h3>
            <span class="price">R$ 139,90</span>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
        <div class="product-card" data-name="Shorts Verão" data-price="39.90">
            <img src="https://ae-pic-a1.aliexpress-media.com/kf/S823909841f4245538e8fd2f007d2b193B.jpg_220x220q75.jpg_.avif" alt="Short Moletom">
            <h3>Shorts Verão</h3>
            <span class="price">R$ 39,90</span>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
    </div>

    <div class="category calcas">
        <div class="product-card" data-name="Calça Baggy" data-price="70.49">
            <img src="https://ae-pic-a1.aliexpress-media.com/kf/S982def9dc4234cb4a57589d190420ad6t.jpg_220x220q75.jpg_.avif" alt="Calça Jeans">
            <h3>Calça Baggy</h3>
            <span class="price">R$ 70,49</span>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
    </div>

    <div class="category camisetas">
        <div class="product-card" data-name="Polo Retro" data-price="112.11">
            <img src="https://ae-pic-a1.aliexpress-media.com/kf/Sd1398b2ae44e43f2b669052171448944o.jpg?has_lang=1&ver=2_220x220q75.jpg_.avif" alt="Camiseta">
            <h3>Polo Retro</h3>
            <span class="price">R$ 112,11</span>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
    </div>

    <div class="category acessorios">
        <div class="product-card" data-name="Aneis y2k" data-price="6.99">
            <img src="https://ae-pic-a1.aliexpress-media.com/kf/S22c63b937eaa47049da3b0085af7356bw.jpg_220x220q75.jpg_.avif" alt="Aneis">
            <h3>Aneis y2k</h3>
            <span class="price">R$ 6,99</span>
            <button class="add-to-cart">Adicionar ao Carrinho</button>
        </div>
    </div>
</main>

<script>
    // --- LÓGICA DO TEMA ---
    const themeToggleBtn = document.getElementById('themeToggle');
    const body = document.body;

    themeToggleBtn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        themeToggleBtn.innerText = body.classList.contains('light-mode') ? '🌙' : '☀️';
    });

    // --- LÓGICA DAS ABAS ---
    const buttons = document.querySelectorAll('.tab-btn');
    const categories = document.querySelectorAll('.category');

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const categoryToOpen = button.getAttribute('data-category');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            categories.forEach(cat => cat.classList.remove('active'));
            document.querySelector(`.category.${categoryToOpen}`).classList.add('active');
        });
    });

    // --- LÓGICA DO CARRINHO ---
    let cart = [];
    const cartSidebar = document.getElementById('cartSidebar');
    const cartItemsContainer = document.getElementById('cartItems');
    const cartCountLabel = document.getElementById('cartCount');
    const cartTotalLabel = document.getElementById('cartTotal');
    const openCartBtn = document.getElementById('cartToggle');
    const closeCartBtn = document.querySelector('.close-cart');

    // Abrir/Fechar
    openCartBtn.onclick = () => cartSidebar.classList.add('open');
    closeCartBtn.onclick = () => cartSidebar.classList.remove('open');

    // Adicionar item
    document.querySelectorAll('.add-to-cart').forEach(button => {
        button.addEventListener('click', (e) => {
            const card = e.target.closest('.product-card');
            const name = card.getAttribute('data-name');
            const price = parseFloat(card.getAttribute('data-price'));

            addToCart(name, price);
            cartSidebar.classList.add('open'); // Abre o carrinho ao adicionar
        });
    });

    function addToCart(name, price) {
        cart.push({ name, price });
        updateCartUI();
    }

    function removeItem(index) {
        cart.splice(index, 1);
        updateCartUI();
    }

    function updateCartUI() {
        cartItemsContainer.innerHTML = '';
        let total = 0;

        cart.forEach((item, index) => {
            total += item.price;
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <div class="cart-item-info">
                    <strong>${item.name}</strong><br>
                    R$ ${item.price.toFixed(2)}
                </div>
                <button class="remove-item" onclick="removeItem(${index})">Remover</button>
            `;
            cartItemsContainer.appendChild(div);
        });

        cartCountLabel.innerText = cart.length;
        cartTotalLabel.innerText = `R$ ${total.toFixed(2)}`;
    }

    // --- BUSCA ---
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(term) ? "block" : "none";
        });
    });
</script>

</body>
</html>
