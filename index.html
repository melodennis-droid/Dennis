<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devify - Com Busca</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --spotify-green: #1DB954;
            --bg-black: #000000;
            --sidebar-black: #121212;
            --text-gray: #b3b3b3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

        body {
            background-color: var(--bg-black);
            color: white;
            height: 100vh;
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
        }

        /* Sidebar */
        .sidebar { background-color: var(--bg-black); padding: 24px; border-right: 1px solid #282828; }
        .logo { font-size: 24px; font-weight: bold; margin-bottom: 25px; display: flex; align-items: center; gap: 8px; }
        .logo i { color: var(--spotify-green); font-size: 30px; }
        
        nav ul { list-style: none; }
        nav li { color: var(--text-gray); padding: 10px 0; cursor: pointer; font-weight: bold; transition: 0.3s; }
        nav li:hover { color: white; }
        nav li i { margin-right: 15px; font-size: 20px; }

        /* Main Content */
        .main-view {
            background: linear-gradient(to bottom, #222, #121212);
            padding: 20px;
            overflow-y: auto;
        }

        /* BARRA DE BUSCA */
        .search-container {
            margin-bottom: 30px;
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 10px 0;
        }

        .search-input {
            width: 300px;
            padding: 12px 20px;
            border-radius: 500px;
            border: none;
            outline: none;
            font-size: 14px;
            background: white;
            color: black;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .music-card {
            background: #181818;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .music-card:hover { background: #282828; }
        .music-card img { width: 100%; border-radius: 5px; margin-bottom: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        .music-card h4 { font-size: 16px; margin-bottom: 5px; }
        .music-card p { color: var(--text-gray); font-size: 13px; }

        /* Player Bar */
        .player-bar {
            grid-column: 1 / 3;
            background-color: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .track-info { display: flex; align-items: center; gap: 15px; width: 30%; }
        #curr-img { width: 56px; height: 56px; background: #333; border-radius: 4px; object-fit: cover; }

        .player-controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .btns { display: flex; align-items: center; gap: 25px; font-size: 18px; color: var(--text-gray); }
        .btns i:hover { color: white; cursor: pointer; }
        .play-trigger { color: white; font-size: 35px; }

        .progress-area { width: 100%; display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-gray); }
        .bar-outer { height: 4px; background: #4f4f4f; flex-grow: 1; border-radius: 2px; cursor: pointer; }
        .bar-inner { height: 100%; background: var(--spotify-green); width: 0%; border-radius: 2px; }

        .volume-area { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; color: var(--text-gray); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fab fa-spotify"></i> Devify</div>
        <nav>
            <ul>
                <li><i class="fas fa-home"></i> Início</li>
                <li style="color: white;"><i class="fas fa-search"></i> Buscar</li>
                <li><i class="fas fa-layer-group"></i> Sua Biblioteca</li>
            </ul>
        </nav>
    </aside>

    <main class="main-view">
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="O que você quer ouvir?">
        </div>

        <h2 style="margin-bottom: 20px;">Resultados</h2>
        <div class="grid-container" id="playlist-grid">
            </div>
    </main>

    <footer class="player-bar">
        <div class="track-info">
            <img id="curr-img" src="https://via.placeholder.com/56" alt="">
            <div>
                <div id="curr-title" style="font-weight: bold; font-size: 14px;">Nenhuma música</div>
                <div id="curr-artist" style="color: #b3b3b3; font-size: 12px;">-</div>
            </div>
        </div>

        <div class="player-controls">
            <div class="btns">
                <i class="fas fa-random"></i>
                <i class="fas fa-step-backward" id="prev"></i>
                <i class="fas fa-play-circle play-trigger" id="masterPlay"></i>
                <i class="fas fa-step-forward" id="next"></i>
                <i class="fas fa-redo"></i>
            </div>
            <div class="progress-area">
                <span id="time-now">0:00</span>
                <div class="bar-outer" id="progress-container">
                    <div class="bar-inner" id="progress-bar"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-area">
            <i class="fas fa-volume-up"></i>
            <div class="bar-outer" style="max-width: 100px;">
                <div class="bar-inner" style="width: 80%;"></div>
            </div>
        </div>
    </footer>

    <audio id="main-audio"></audio>

    <script>
        const songs = [
            { title: "Summer Vibes", artist: "Bensound", cover: "https://picsum.photos/id/10/200", file: "https://www.bensound.com/bensound-music/bensound-summer.mp3" },
            { title: "Creative Minds", artist: "Bensound", cover: "https://picsum.photos/id/20/200", file: "https://www.bensound.com/bensound-music/bensound-creativeminds.mp3" },
            { title: "Going Higher", artist: "Corporate", cover: "https://picsum.photos/id/30/200", file: "https://www.bensound.com/bensound-music/bensound-goinghigher.mp3" },
            { title: "Acoustic Breeze", artist: "Relax", cover: "https://picsum.photos/id/40/200", file: "https://www.bensound.com/bensound-music/bensound-acousticbreeze.mp3" },
            { title: "Sunny Day", artist: "Pop", cover: "https://picsum.photos/id/50/200", file: "https://www.bensound.com/bensound-music/bensound-sunny.mp3" }
        ];

        const audio = document.getElementById('main-audio');
        const masterPlay = document.getElementById('masterPlay');
        const grid = document.getElementById('playlist-grid');
        const searchInput = document.getElementById('searchInput');
        const progressBar = document.getElementById('progress-bar');
        const timeNow = document.getElementById('time-now');
        const timeTotal = document.getElementById('time-total');

        let songIndex = 0;

        // Função para criar a galeria (usada na busca também)
        function renderSongs(songsToDisplay) {
            grid.innerHTML = "";
            songsToDisplay.forEach((song) => {
                // Encontrar o index original da música para tocar corretamente
                const originalIndex = songs.findIndex(s => s.file === song.file);
                
                const card = document.createElement('div');
                card.classList.add('music-card');
                card.innerHTML = `
                    <img src="${song.cover}" alt="Capa">
                    <h4>${song.title}</h4>
                    <p>${song.artist}</p>
                `;
                card.onclick = () => loadSong(originalIndex);
                grid.appendChild(card);
            });
        }

        // Lógica da Busca
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = songs.filter(song => 
                song.title.toLowerCase().includes(term) || 
                song.artist.toLowerCase().includes(term)
            );
            renderSongs(filtered);
        });

        // Inicializar
        renderSongs(songs);

        function loadSong(index) {
            songIndex = index;
            const song = songs[songIndex];
            audio.src = song.file;
            document.getElementById('curr-title').innerText = song.title;
            document.getElementById('curr-artist').innerText = song.artist;
            document.getElementById('curr-img').src = song.cover;
            playSong();
        }

        function playSong() {
            audio.play();
            masterPlay.classList.replace('fa-play-circle', 'fa-pause-circle');
        }

        function pauseSong() {
            audio.pause();
            masterPlay.classList.replace('fa-pause-circle', 'fa-play-circle');
        }

        masterPlay.onclick = () => {
            if (!audio.src) return;
            if (audio.paused) playSong(); else pauseSong();
        };

        audio.ontimeupdate = (e) => {
            const { duration, currentTime } = e.srcElement;
            if (duration) {
                const percent = (currentTime / duration) * 100;
                progressBar.style.width = `${percent}%`;
                
                let min = Math.floor(currentTime / 60);
                let sec = Math.floor(currentTime % 60);
                timeNow.innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;

                let minT = Math.floor(duration / 60);
                let secT = Math.floor(duration % 60);
                timeTotal.innerText = `${minT}:${secT < 10 ? '0'+secT : secT}`;
            }
        };

        document.getElementById('progress-container').onclick = (e) => {
