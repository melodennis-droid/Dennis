<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store - Nova Coleção</title>
    <style>
        /* --- DESIGN ÚNICO: ELECTRIC GLASS & NEOMORPHISM --- */
        :root {
            --bg-color: #0f111a;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --text-color: #e0e0e0;
            --header-bg: rgba(15, 17, 26, 0.8);
            --element-bg: #161925;
            --border-color: rgba(255, 255, 255, 0.1);
            --btn-inactive: #25293d;
            --accent-color: #8a2be2; /* Violeta Elétrico */
            --accent-gradient: linear-gradient(135deg, #8a2be2, #00d2ff);
            --shadow-color: rgba(0, 0, 0, 0.5);
            --look-bg: #1a1d2e;
            --border-radius: 20px;
        }

        body.light-mode {
            --bg-color: #f0f2f5;
            --glass-bg: rgba(0, 0, 0, 0.03);
            --text-color: #2d3436;
            --header-bg: rgba(255, 255, 255, 0.8);
            --element-bg: #ffffff;
            --border-color: rgba(0, 0, 0, 0.1);
            --btn-inactive: #e0e0e0;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --look-bg: #f9f9f9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: all 0.4s ease;
            overflow-x: hidden;
        }

        /* Header com Efeito de Vidro */
        header {
            background-color: var(--header-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid var(--border-color);
        }

        header h1 { 
            font-size: 24px; 
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 3px;
            font-weight: 800;
        }

        #themeToggle, #cartToggle {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 12px;
            cursor: pointer;
            color: var(--text-color);
            transition: 0.3s;
        }

        #cartCount {
            background: var(--accent-color);
            color: white;
            font-size: 11px;
            padding: 2px 7px;
            border-radius: 50%;
            margin-left: 5px;
        }

        /* Navegação Estilo Pílula */
        nav { display: flex; gap: 12px; justify-content: center; padding: 25px; flex-wrap: wrap; }
        nav button {
            background: var(--btn-inactive);
            border: 1px solid transparent;
            padding: 10px 20px;
            color: var(--text-color);
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        nav button.active { 
            background: var(--accent-gradient); 
            color: white; 
            box-shadow: 0 10px 20px rgba(138, 43, 226, 0.3);
            transform: scale(1.05);
        }

        .search-bar { text-align: center; padding: 10px 20px 30px; }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 15px 25px;
            border-radius: 15px;
            background-color: var(--element-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            outline: none;
            box-shadow: var(--shadow-color) 0px 4px 12px;
        }

        /* Grid de Produtos Premium */
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 30px;
            padding: 20px 5% 50px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--element-bg);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: 0.4s;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 15px;
        }

        .product-card:hover { 
            transform: translateY(-10px); 
            border-color: var(--accent-color);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .product-card img { 
            width: 100%; 
            height: 280px; 
            object-fit: cover; 
            border-radius: 15px;
        }
        
        .card-content { padding: 15px 5px; text-align: left; }
        .card-content h3 { font-size: 18px; margin-bottom: 8px; font-weight: 600; }
        .price { color: var(--accent-color); font-weight: 800; font-size: 20px; margin-bottom: 15px; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 10px; }

        .btn-link, .add-to-look, .add-to-cart {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            text-decoration: none;
        }

        .add-to-cart {
            background: var(--accent-gradient);
            color: white;
            border: none;
        }

        .add-to-look {
            background: rgba(138, 43, 226, 0.1);
            border: 1px dashed var(--accent-color);
            color: var(--accent-color);
        }

        .btn-link { 
            border: 1px solid var(--border-color); 
            color: var(--text-color); 
        }

        /* Sidebar do Carrinho */
        #cartSidebar {
            position: fixed;
            top: 0;
            right: -400px;
            width: 350px;
            height: 100%;
            background: var(--element-bg);
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 30px;
        }
        #cartSidebar.open { right: 0; }

        /* Montador de Look Estilizado */
        .look-canvas {
            background: var(--look-bg);
            border: 2px dashed var(--accent-color);
            border-radius: 30px;
            min-height: 350px;
            margin-top: 20px;
        }

        .look-item {
            background: var(--element-bg);
            border-radius: 20px;
            border-bottom: 4px solid var(--accent-color);
        }

        @media(max-width: 600px) {
            .products { grid-template-columns: 1fr; }
            #cartSidebar { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>Fashion Store</h1>
    <div class="header-actions">
        <button id="themeToggle">☀️</button>
        <button id="cartToggle">🛒 <span id="cartCount">0</span></button>
    </div>
</header>

<nav>
    <button class="tab-btn active" data-category="shorts">Shorts</button>
    <button class="tab-btn" data-category="calcas">Calças</button>
    <button class="tab-btn" data-category="camisetas">Camisetas</button>
    <button class="tab-btn" data-category="acessorios">Acessórios</button>
    <button class="tab-btn" data-category="tenis">Tênis</button>
    <button class="tab-btn" data-category="montar-look" style="border: 1px solid var(--accent-color);">✨ Montar Look</button>
</nav>

<div class="search-bar" id="searchContainer">
    <input type="text" id="searchInput" placeholder="Busque por estilo, cor ou peça...">
</div>

<aside id="cartSidebar">
    <div class="cart-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h2 style="color: var(--accent-color)">Meu Carrinho</h2>
        <button onclick="document.getElementById('cartSidebar').classList.remove('open')" style="background:none; border:none; color:var(--text-color); font-size:30px; cursor:pointer;">&times;</button>
    </div>
    <div id="cartItems"></div>
    <div class="cart-footer">
        <p style="display:flex; justify-content:space-between; margin: 20px 0; font-weight:bold; font-size: 18px;">Total: <span id="cartTotal">R$ 0,00</span></p>
        <button class="add-to-cart" style="width: 100%;" onclick="alert('Checkout em breve!')">Finalizar Compra</button>
    </div>
</aside>

<div class="montar-look-container category montar-look" style="display: none; padding: 0 5% 50px; max-width: 1000px; margin: 0 auto; text-align: center;">
    <div class="look-header">
        <h2 style="font-size: 28px; margin-bottom: 10px;">Provador Virtual</h2>
        <p style="opacity: 0.7;">Combine as peças e crie um visual único.</p>
    </div>
    <div class="look-canvas" id="lookCanvas" style="display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: center; padding: 40px;">
        <p id="emptyLookMsg">Arraste peças aqui para começar seu look!</p>
    </div>
    <div class="look-footer" style="margin-top: 30px;">
        <h3 style="margin-bottom: 20px;">Investimento no Look: <span id="lookTotal">R$ 0,00</span></h3>
        <button id="buyLookBtn" class="add-to-cart" style="display: none; padding: 15px 40px; margin: 0 auto;">Adicionar Look Completo</button>
    </div>
</div>

<main class="products" id="productGrid">
    <div class="category shorts active">
        <div class="product-card" data-name="Jorts Super Baggy" data-price="139.90" data-url="https://www.lojasrenner.com.br/p/bermuda-jorts-super-baggy-em-jeans-com-cinto-amarracao/-/A-928064491-br.lr?sku=928167730">
            <img src="https://img.lojasrenner.com.br/item/928167705/original/5.jpg" alt="Jorts">
            <div class="card-content">
                <h3>Jorts Super Baggy</h3>
                <span class="price">R$ 139,90</span>
                <div class="btn-group">
                    <button class="add-to-look">👕 Adicionar ao Look</button>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                    <a href="https://www.lojasrenner.com.br/p/bermuda-jorts-super-baggy-em-jeans-com-cinto-amarracao/-/A-928064491-br.lr?sku=928167730" target="_blank" class="btn-link">Ver na Loja</a>
                </div>
            </div>
        </div>
    </div>

    <div class="category calcas" style="display: none;">
        <div class="product-card" data-name="Calça Baggy Jeans" data-price="70.49" data-url="https://pt.aliexpress.com/item/1005009202854463.html">
            <img src="https://ae-pic-a1.aliexpress-media.com/kf/S982def9dc4234cb4a57589d190420ad6t.jpg_220x220q75.jpg_.avif" alt="Calça">
            <div class="card-content">
                <h3>Calça Baggy Jeans</h3>
                <span class="price">R$ 70,49</span>
                <div class="btn-group">
                    <button class="add-to-look">👕 Adicionar ao Look</button>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                    <a href="https://pt.aliexpress.com/item/1005009202854463.html" target="_blank" class="btn-link">Ver na Loja</a>
                </div>
            </div>
        </div>
    </div>

    <div class="category tenis" style="display: none;">
        <div class="product-card" data-name="Tênis PUMA-180" data-price="699.99" data-url="https://br.puma.com/pd/tenis-puma-180/402101.html?color=18">
            <img src="https://images.puma.com/image/upload/f_auto,q_auto,w_600,b_rgb:FAFAFA/global/402101/18/sv01/fnd/BRA/fmt/png" alt="PUMA 180">
            <div class="card-content">
                <h3>Tênis PUMA-180</h3>
                <span class="price">R$ 699,99</span>
                <div class="btn-group">
                    <button class="add-to-look">👕 Adicionar ao Look</button>
                    <button class="add-to-cart">Adicionar ao Carrinho</button>
                </div>
            </div>
        </div>
    </div>
</main>

<script>
    // --- LÓGICA DE INTERFACE ---
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.onclick = () => {
        document.body.classList.toggle('light-mode');
        themeToggle.innerText = document.body.classList.contains('light-mode') ? '🌙' : '☀️';
    };

    const tabs = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            
            const category = tab.dataset.category;
            const isLook = category === 'montar-look';

            document.getElementById('searchContainer').style.display = isLook ? 'none' : 'block';
            document.getElementById('productGrid').style.display = isLook ? 'none' : 'grid';
            document.querySelector('.montar-look-container').style.display = isLook ? 'block' : 'none';

            if(!isLook) {
                document.querySelectorAll('.category').forEach(c => c.style.display = 'none');
                document.querySelectorAll(`.category.${category}`).forEach(c => c.style.display = 'contents');
            }
        };
    });

    // --- LÓGICA DO CARRINHO ---
    let cart = [];
    const sidebar = document.getElementById('cartSidebar');

    document.getElementById('cartToggle').onclick = () => sidebar.classList.add('open');

    function updateCartUI() {
        const container = document.getElementById('cartItems');
        container.innerHTML = '';
        let total = 0;
        cart.forEach((item, i) => {
            total += item.price;
            container.innerHTML += `
                <div style="background:var(--glass-bg); padding:15px; border-radius:15px; margin-bottom:10px;">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${item.name}</strong>
                        <span>R$ ${item.price.toFixed(2).replace('.', ',')}</span>
                    </div>
                    <button onclick="removeFromCart(${i})" style="color:#ff3b3b; background:none; border:none; cursor:pointer; font-size:12px; margin-top:5px;">Remover</button>
                </div>`;
        });
        document.getElementById('cartCount').innerText = cart.length;
        document.getElementById('cartTotal').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    document.querySelectorAll('.add-to-cart').forEach(btn => {
        btn.onclick = (e) => {
            const card = e.target.closest('.product-card');
            if(!card) return;
            cart.push({
                name: card.dataset.name,
                price: parseFloat(card.dataset.price)
            });
            updateCartUI();
            sidebar.classList.add('open');
        };
    });

    window.removeFromCart = (i) => {
        cart.splice(i, 1);
        updateCartUI();
    };

    // --- LÓGICA DO PROVADOR (LOOK) ---
    let lookItems = [];
    const lookCanvas = document.getElementById('lookCanvas');
    const buyLookBtn = document.getElementById('buyLookBtn');

    document.querySelectorAll('.add-to-look').forEach(btn => {
        btn.onclick = (e) => {
            const card = e.target.closest('.product-card');
            const item = {
                name: card.dataset.name,
                price: parseFloat(card.dataset.price),
                img: card.querySelector('img').src
            };
            
            if(!lookItems.some(i => i.name === item.name)) {
                lookItems.push(item);
                updateLookUI();
                alert("Peça enviada ao provador!");
            }
        };
    });

    function updateLookUI() {
        lookCanvas.innerHTML = '';
        let total = 0;
        if(lookItems.length === 0) {
            lookCanvas.innerHTML = '<p>Arraste peças aqui para começar seu look!</p>';
            buyLookBtn.style.display = 'none';
        } else {
            buyLookBtn.style.display = 'block';
            lookItems.forEach((item, i) => {
                total += item.price;
                const div = document.createElement('div');
                div.className = 'look-item';
                div.style.padding = '15px';
                div.style.width = '150px';
                div.innerHTML = `
                    <img src="${item.img}" style="width:100%; border-radius:10px; margin-bottom:10px;">
                    <p style="font-size:12px; font-weight:bold;">${item.name}</p>
                    <button onclick="removeFromLook(${i})" style="background:red; color:white; border:none; border-radius:50%; width:20px; cursor:pointer;">&times;</button>
                `;
                lookCanvas.appendChild(div);
            });
        }
        document.getElementById('lookTotal').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
    }

    window.removeFromLook = (i) => {
        lookItems.splice(i, 1);
        updateLookUI();
    };

    buyLookBtn.onclick = () => {
        lookItems.forEach(item => cart.push({name: item.name, price: item.price}));
        updateCartUI();
        sidebar.classList.add('open');
    };

    // Busca Simples
    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        document.querySelectorAll('.product-card').forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(val) ? "flex" : "none";
        });
    };
</script>

</body>
</html>
