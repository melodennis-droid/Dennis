<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevSpotify - Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS INTEGRADO */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: grid;
            grid-template-columns: 240px 1fr;
            grid-template-rows: 1fr 90px;
        }

        /* Sidebar */
        .sidebar {
            background-color: #000;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .logo i { color: #1db954; font-size: 30px; }

        nav ul { list-style: none; }
        nav ul li {
            padding: 10px 0;
            color: #b3b3b3;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        nav ul li:hover { color: #fff; }
        nav ul li i { margin-right: 15px; font-size: 20px; }

        /* Conteúdo Principal */
        .main-content {
            background: linear-gradient(to bottom, #1f1f1f, #121212);
            padding: 20px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .upgrade-btn {
            background: transparent;
            border: 1px solid #b3b3b3;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        .upgrade-btn:hover { transform: scale(1.05); border-color: #fff; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .card {
            background: #181818;
            padding: 15px;
            border-radius: 8px;
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }
        .card:hover { background: #282828; }
        .card img { width: 100%; border-radius: 4px; margin-bottom: 10px; }
        .card h4 { margin-bottom: 8px; }
        .card p { color: #b3b3b3; font-size: 14px; }

        /* Player Bar */
        .player-bar {
            grid-column: 1 / 3;
            background-color: #181818;
            border-top: 1px solid #282828;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
        }

        .current-track { display: flex; align-items: center; gap: 15px; width: 30%; }
        .track-img { width: 56px; height: 56px; background: #333; border-radius: 4px; }

        .controls { width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-buttons { display: flex; align-items: center; gap: 20px; color: #b3b3b3; }
        .control-buttons i:hover { color: #fff; cursor: pointer; }
        .play-btn { color: #fff; font-size: 35px; transition: 0.2s; }
        .play-btn:hover { transform: scale(1.1); }

        .progress-container { display: flex; align-items: center; gap: 10px; width: 100%; font-size: 12px; color: #b3b3b3; }
        .progress-bar { height: 4px; background: #4f4f4f; flex-grow: 1; border-radius: 2px; position: relative; }
        .progress-fill { height: 100%; background: #1db954; width: 0%; border-radius: 2px; }

        .volume-container { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 10px; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fab fa-spotify"></i> Devify</div>
        <nav>
            <ul>
                <li><i class="fas fa-home"></i> Início</li>
                <li><i class="fas fa-search"></i> Buscar</li>
                <li><i class="fas fa-book"></i> Sua Biblioteca</li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header>
            <div></div>
            <button class="upgrade-btn">VER PLANOS</button>
        </header>

        <h2>Feito para você</h2>
        <div class="grid-container">
            <div class="card">
                <img src="https://picsum.photos/200" alt="Capa">
                <h4>Daily Mix 1</h4>
                <p>Músicas que você ama no momento.</p>
            </div>
            <div class="card">
                <img src="https://picsum.photos/201" alt="Capa">
                <h4>Descobertas</h4>
                <p>Novos sons baseados no seu gosto.</p>
            </div>
            <div class="card">
                <img src="https://picsum.photos/202" alt="Capa">
                <h4>Top Brasil</h4>
                <p>As mais tocadas no país.</p>
            </div>
        </div>
    </main>

    <footer class="player-bar">
        <div class="current-track">
            <div class="track-img"></div>
            <div>
                <div style="font-weight: bold; font-size: 14px;">Study Music (Lo-fi)</div>
                <div style="color: #b3b3b3; font-size: 12px;">Chill Station</div>
            </div>
        </div>

        <div class="controls">
            <div class="control-buttons">
                <i class="fas fa-random"></i>
                <i class="fas fa-step-backward"></i>
                <i class="fas fa-play-circle play-btn" id="playPause"></i>
                <i class="fas fa-step-forward"></i>
                <i class="fas fa-redo"></i>
            </div>
            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span>3:00</span>
            </div>
        </div>

        <div class="volume-container">
            <i class="fas fa-volume-up"></i>
            <div class="progress-bar" style="max-width: 100px;">
                <div class="progress-fill" style="width: 70%;"></div>
            </div>
        </div>
    </footer>

    <audio id="musicPlayer" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        const audio = document.getElementById('musicPlayer');
        const playBtn = document.getElementById('playPause');
        const progressFill = document.getElementById('progressFill');
        const currentTimeEl = document.getElementById('currentTime');

        // Função Tocar/Pausar
        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.classList.replace('fa-play-circle', 'fa-pause-circle');
            } else {
                audio.pause();
                playBtn.classList.replace('fa-pause-circle', 'fa-play-circle');
            }
        });

        // Atualizar barra de progresso
        audio.addEventListener('timeupdate', () => {
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            
            // Formatar tempo
            let mins = Math.floor(audio.currentTime / 60);
            let secs = Math.floor(audio.currentTime % 60);
            currentTimeEl.innerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
        });
    </script>
</body>
</html>
