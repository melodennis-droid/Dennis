<script>
    const buttons = document.querySelectorAll('.tab-btn');
    const categories = document.querySelectorAll('.category');
    const searchInput = document.getElementById('searchInput');

    // Trocar Abas
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            // 1. Remove classe ativa de todos os botões e adiciona ao clicado
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // 2. Pega o nome da categoria do botão (ex: 'acessorios')
            const catTarget = btn.getAttribute('data-category');

            // 3. Mostra apenas a categoria correspondente
            categories.forEach(cat => {
                if (cat.classList.contains(catTarget)) {
                    cat.style.display = 'contents'; // Mostra no grid
                } else {
                    cat.style.display = 'none';     // Esconde
                }
            });

            // Limpa a busca ao trocar de aba
            searchInput.value = "";
            resetSearch();
        });
    });

    function resetSearch() {
        document.querySelectorAll('.product-card').forEach(card => {
            card.style.display = 'block';
        });
    }

    // Lógica de Busca (Opcional, mas funcional)
    searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase();
        const activeCategory = document.querySelector('.category[style*="display: contents"]') || document.querySelector('.category.active');
        
        const cards = activeCategory.querySelectorAll('.product-card');
        cards.forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            card.style.display = title.includes(term) ? 'block' : 'none';
        });
    });
</script>
