<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Store - Nova Coleção</title>
    <style>
        /* 1. VARIÁVEIS CSS (Cores do Modo Escuro - Padrão) */
        :root {
            --bg-color: #0a0a0a;
            --text-color: #f0f0f0;
            --header-bg: #000000;
            --element-bg: #111111; /* cards e input */
            --border-color: #222222;
            --btn-inactive: #222222;
            --btn-hover: #333333;
            --accent-color: #ff3b3b;
            --accent-hover: #d32f2f;
            --shadow-color: rgba(0, 0, 0, 0.5);
            --header-shadow: rgba(0, 0, 0, 0.8);
        }

        /* 2. CORES DO MODO CLARO (Ativadas via classe no body) */
        body.light-mode {
            --bg-color: #f4f4f5;
            --text-color: #1a1a1a;
            --header-bg: #ffffff;
            --element-bg: #ffffff;
            --border-color: #dddddd;
            --btn-inactive: #e0e0e0;
            --btn-hover: #cccccc;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --header-shadow: rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        
        /* Aplicando as variáveis nas regras de CSS */
        body { 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            transition: background-color 0.3s, color 0.3s; /* Transição suave */
        }

        header {
            background-color: var(--header-bg);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 2px 10px var(--header-shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            border-bottom: 1px solid var(--border-color);
            transition: background-color 0.3s, box-shadow 0.3s, border-color 0.3s;
        }

        header h1 { font-size: 22px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Botão de trocar tema */
        #themeToggle {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-color);
            transition: transform 0.3s;
        }
        #themeToggle:hover { transform: scale(1.1); }

        .login-btn {
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }
        .login-btn:hover { background-color: var(--accent-hover); }

        nav { display: flex; gap: 10px; margin-top: 10px; }
        nav button {
            background: var(--btn-inactive);
            border: none;
            font-size: 14px;
            cursor: pointer;
            padding: 8px 15px;
            transition: 0.3s;
            color: var(--text-color);
            border-radius: 20px;
            font-weight: 600;
        }
        nav button:hover { background-color: var(--btn-hover); }
        nav button.active { background-color: var(--accent-color); color: white; }

        .search-bar { margin: 25px auto; text-align: center; padding: 0 20px; }
        .search-bar input {
            width: 100%;
            max-width: 500px;
            padding: 12px 25px;
            border-radius: 30px;
            background-color: var(--element-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            outline: none;
            transition: 0.3s;
        }
        .search-bar input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 8px rgba(255, 59, 59, 0.3);
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
            padding: 20px 5%;
            max-width: 1300px;
            margin: 0 auto;
        }

        .product-card {
            background: var(--element-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease, background-color 0.3s;
            text-align: center;
            box-shadow: 0 4px 15px var(--shadow-color);
            display: block;
            text-decoration: none;
            color: inherit;
            border: 1px solid var(--border-color);
        }

        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 8px 20px rgba(255, 59, 59, 0.15); 
            border-color: var(--accent-color);
        }

        .product-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            opacity: 0.9;
            transition: opacity 0.3s;
        }
        
        .product-card:hover img { opacity: 1; }
        .product-card h3 { padding: 15px 10px 5px; font-size: 16px; color: var(--text-color); }
        .product-card p { color: var(--accent-color); font-weight: bold; padding-bottom: 20px; font-size: 18px; }

        .category { display: none; }
        .category.active { display: contents; }

        @media(max-width: 600px) {
            header { flex-direction: column; padding: 15px; text-align: center; }
            .header-actions { margin-top: 15px; width: 100%; justify-content: space-between; }
            nav { margin-top: 15px; flex-wrap: wrap; justify-content: center; }
            .login-btn { width: auto; flex-grow: 1; text-align: center; }
            .products { grid-template-columns: repeat(2, 1fr); gap: 15px; }
            .product-card img { height: 180px; }
        }
    </style>
</head>
<body>

<script>
    // --- LÓGICA DO TEMA CLARO/ESCURO ---
    const themeToggleBtn = document.getElementById('themeToggle');
    const body = document.body;

    // Verifica no localStorage se o usuário já havia escolhido o tema claro antes
    const currentTheme = localStorage.getItem('theme');
    if (currentTheme === 'light') {
        body.classList.add('light-mode');
        themeToggleBtn.innerText = '🌙'; // Muda o ícone para lua
    }

    // Função que roda ao clicar no botão
    themeToggleBtn.addEventListener('click', () => {
        body.classList.toggle('light-mode');
        
        // Se o body agora tem a classe light-mode, salvamos isso e mudamos o ícone
        if (body.classList.contains('light-mode')) {
            localStorage.setItem('theme', 'light');
            themeToggleBtn.innerText = '🌙'; 
        } else {
            // Se voltou pro escuro, limpamos o localStorage e mudamos pro sol
            localStorage.setItem('theme', 'dark');
            themeToggleBtn.innerText = '☀️';
        }
    });

    // --- LÓGICA DAS ABAS DE CATEGORIAS ---
    const buttons = document.querySelectorAll('.tab-btn');
    const categories = document.querySelectorAll('.category');

    buttons.forEach(button => {
        button.addEventListener('click', () => {
            const categoryToOpen = button.getAttribute('data-category');
            buttons.forEach(btn => btn.classList.remove('active'));
            button.classList.add('active');
            categories.forEach(cat => cat.classList.remove('active'));
            document.querySelector(`.category.${categoryToOpen}`).classList.add('active');
        });
    });

    // --- LÓGICA DA BARRA DE BUSCA ---
    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        // Em vez de buscar só na categoria ativa, busca em todos os cards e muda o display
        const productCards = document.querySelectorAll('.product-card');

        productCards.forEach(card => {
            const title = card.querySelector('h3').innerText.toLowerCase();
            if(title.includes(term)) {
                // Ao invés de usar block, use flex ou o valor original se necessário. 
                // Aqui block já atende porque o "a" nativamente suporta.
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        });
    });
</script>
