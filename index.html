<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja de Roupas</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

    body {
        background-color: #f5f5f5;
        color: #333;
    }

    header {
        background-color: #222;
        color: white;
        padding: 20px;
        text-align: center;
        font-size: 24px;
        font-weight: bold;
    }

    nav {
        display: flex;
        justify-content: center;
        background-color: #333;
    }

    nav button {
        background: none;
        border: none;
        color: white;
        padding: 15px 25px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
    }

    nav button:hover, nav button.active {
        background-color: #1DB954;
    }

    .products {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
    }

    .product-card {
        background-color: white;
        border-radius: 8px;
        overflow: hidden;
        box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        text-align: center;
        transition: transform 0.3s;
    }

    .product-card:hover {
        transform: translateY(-5px);
    }

    .product-card img {
        width: 100%;
        height: 200px;
        object-fit: cover;
    }

    .product-card h3 {
        padding: 10px;
        font-size: 18px;
    }

    .product-card p {
        color: #666;
        padding-bottom: 10px;
    }

    /* Esconder todas as categorias por padrão */
    .category {
        display: none;
    }

    /* Mostrar categoria ativa */
    .category.active {
        display: grid;
    }
</style>
</head>
<body>

<header>Minha Loja de Roupas</header>

<nav>
    <button class="tab-btn active" data-category="shorts">Shorts</button>
    <button class="tab-btn" data-category="calcas">Calças</button>
    <button class="tab-btn" data-category="camisetas">Camisetas</button>
</nav>

<div class="products">

    <!-- Shorts -->
    <div class="category shorts active">
        <div class="product-card">
            <img src="https://picsum.photos/id/1011/400/400" alt="Short Jeans">
            <h3>Short Jeans</h3>
            <p>R$ 79,90</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/id/1012/400/400" alt="Short Moletom">
            <h3>Short Moletom</h3>
            <p>R$ 59,90</p>
        </div>
    </div>

    <!-- Calças -->
    <div class="category calcas">
        <div class="product-card">
            <img src="https://picsum.photos/id/1013/400/400" alt="Calça Jeans">
            <h3>Calça Jeans</h3>
            <p>R$ 129,90</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/id/1014/400/400" alt="Calça Moletom">
            <h3>Calça Moletom</h3>
            <p>R$ 99,90</p>
        </div>
    </div>

    <!-- Camisetas -->
    <div class="category camisetas">
        <div class="product-card">
            <img src="https://picsum.photos/id/1015/400/400" alt="Camiseta Básica">
            <h3>Camiseta Básica</h3>
            <p>R$ 49,90</p>
        </div>
        <div class="product-card">
            <img src="https://picsum.photos/id/1016/400/400" alt="Camiseta Estampada">
            <h3>Camiseta Estampada</h3>
            <p>R$ 59,90</p>
        </div>
    </div>

</div>

<script>
    const buttons = document.querySelectorAll('.tab-btn');
    const categories = document.querySelectorAll('.category');

    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            // Remover active dos botões
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Mostrar categoria selecionada
            const cat = btn.dataset.category;
            categories.forEach(c => {
                c.classList.remove('active');
                if(c.classList.contains(cat)) {
                    c.classList.add('active');
                }
            });
        });
    });
</script>

</body>
</html>
