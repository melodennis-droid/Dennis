<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>CSS Aim Trainer</title>
    <style>
        body {
            margin: 0;
            background: #1a1a1a;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: crosshair;
        }

        h1 { margin-top: 20px; color: #00ffcc; }

        /* Container do Jogo */
        .game-world {
            position: relative;
            width: 80vw;
            height: 70vh;
            background: #252525;
            border: 2px solid #444;
            overflow: hidden;
        }

        /* Esconder os checkboxes reais */
        input[type="checkbox"] {
            display: none;
        }

        /* O Alvo */
        .target {
            position: absolute;
            width: 40px;
            height: 40px;
            background: radial-gradient(circle, red 30%, white 31%, white 60%, red 61%);
            border-radius: 50%;
            display: block;
            transition: transform 0.1s;
        }

        /* Animação de movimento para cada alvo */
        @keyframes move1 { 0%, 100% { top: 10%; left: 10%; } 50% { top: 80%; left: 80%; } }
        @keyframes move2 { 0%, 100% { top: 70%; left: 20%; } 50% { top: 20%; left: 70%; } }
        @keyframes move3 { 0%, 100% { top: 40%; left: 80%; } 50% { top: 50%; left: 10%; } }

        .t1 { animation: move1 4s infinite linear; }
        .t2 { animation: move2 3s infinite linear; }
        .t3 { animation: move3 5s infinite linear; }

        /* Lógica: Quando o checkbox é marcado (clicado), o alvo some */
        input:checked + .target {
            display: none;
        }

        /* Contador de Pontos (CSS Puro) */
        body { counter-reset: score; }
        input:checked { counter-increment: score; }

        .score-board::after {
            content: "Alvos atingidos: " counter(score);
            font-size: 24px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>CSS Aim Trainer</h1>
    <div class="score-board"></div>

    <div class="game-world">
        <input type="checkbox" id="t1">
        <label for="t1" class="target t1"></label>

        <input type="checkbox" id="t2">
        <label for="t2" class="target t2"></label>

        <input type="checkbox" id="t3">
        <label for="t3" class="target t3"></label>
    </div>

    <p>Clique nos alvos para eliminá-los!</p>

</body>
</html>
