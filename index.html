<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loja Fashion</title>
<style>
    /* Reset e fontes */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
    body { background-color: #f9f9f9; color: #333; }

    /* Header */
    header {
        background-color: #fff;
        position: sticky;
        top: 0;
        z-index: 1000;
        box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 15px 30px;
    }

    header h1 { font-size: 24px; color: #ff4081; text-transform: uppercase; letter-spacing: 2px; }

    nav {
        display: flex;
        gap: 20px;
    }

    nav button {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        padding: 8px 15px;
        transition: all 0.3s;
        color: #555;
        border-radius: 4px;
        font-weight: 500;
    }

    nav button:hover, nav button.active {
        background-color: #ff4081;
        color: white;
    }

    /* Busca */
    .search-bar {
        margin: 20px auto;
        text-align: center;
    }

    .search-bar input {
        width: 60%;
        max-width: 400px;
        padding: 12px 20px;
        border-radius: 50px;
        border: 1px solid #ddd;
        outline: none;
        font-size: 14px;
        transition: all 0.3s;
    }

    .search-bar input:focus {
        border-color: #ff4081;
        box-shadow: 0 0 8px rgba(255, 64, 129, 0.2);
    }

    /* Produtos */
    .products {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 30px;
        padding: 20px 30px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .product-card {
        background: #fff;
        border-radius: 12px;
        overflow: hidden;
        transition: transform 0.3s, box-shadow 0.3s;
        cursor: pointer;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .product-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 25px rgba(0,0,0,0.1);
    }

    .product-card img {
        width: 100%;
        height: 320px;
        object-fit: cover;
    }

    .product-card h3 {
        padding: 15px 10px 5px;
        font-size: 16px;
        color: #444;
    }

    .product-card p {
        color: #ff4081;
        font-weight: bold;
        padding-bottom: 20px;
        font-size: 18px;
    }

    /* Controle de categorias */
    .category { display: none; }
    .category.active { display: contents; } /* Use 'contents' para manter o grid pai */

    @media(max-width: 600px) {
        .search-bar input { width: 90%; }
        header { flex-direction: column; gap: 15px; }
        .products { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 10px; }
        .product-card img { height: 200px; }
    }
</style>
</head>
<body>

<header>
    <h1>Fashion Store</h1>
    <nav>
        <button class="tab-btn active" data-category="shorts">Shorts</button>
        <button class="tab-btn" data-category="calcas">Calças</button>
        <button class="tab-btn" data-category="camisetas">Camisetas</button>
    </nav>
</header>

<div class="search-bar">
    <input type="text" id="searchInput" placeholder="O que você está procurando hoje?">
</div>

<main class="products">

    <div class="category shorts active">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1591195853828-11db59a44f6b?auto=format&fit=crop&q=80&w=400" alt="Short Jeans">
            <h3>Short Jeans Premium</h3>
            <p>R$ 79,90</p>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1591195853730-410a6245d8b7?auto=format&fit=crop&q=80&w=400" alt="Short Moletom">
            <h3>Short Moletom Confort</h3>
            <p>R$ 59,90</p>
        </div>
    </div>

    <div class="category calcas">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?auto=format&fit=crop&q=80&w=400" alt="Calça Jeans">
            <h3>Calça Jeans Slim Fit</h3>
            <p>R$ 129,90</p>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1552902865-b72c031ac5ea?auto=format&fit=crop&q=80&w=400" alt="Calça Moletom">
            <h3>Calça Jogger Urban</h3>
            <p>R$ 99,90</p>
        </div>
    </div>

    <div class="category camisetas">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=400" alt="Camiseta Básica">
            <h3>Camiseta Básica Cotton</h3>
            <p>R$ 49,90</p>
        </div>
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&q=80&w=400" alt="Camiseta Estampada">
            <h3>Camiseta Graphic Tee</h3>
            <p>R$ 59,90</p>
        </div>
    </div>

</main>

<script>
    const buttons = document.querySelectorAll('.tab-btn');
    const categories = document.querySelectorAll('.category');
    const searchInput = document.getElementById('searchInput');

    // Alternar categorias
    buttons.forEach(btn => {
        btn.addEventListener('click', () => {
            // Remove active dos botões
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filtra as categorias
            const catSelected = btn.dataset.category;
            categories.forEach(c => {
                if(c.classList.contains(catSelected)) {
                    c.classList.add('active');
                } else {
                    c.classList.remove('active');
                }
            });
            // Limpa a busca ao trocar de aba para não bugar
            searchInput.value = "";
            showAllCards();
        });
    });

    function showAllCards() {
        document.querySelectorAll('.product-card').forEach(card => card.style.display = 'block');
    }

    // Busca por nome
    searchInput.addEventListener('input', () => {
        const term = searchInput.value.toLowerCase();
        
        categories.forEach(cat => {
            const cards = cat.querySelectorAll('.product-card');
            let anyVisibleInCat = false;

            cards.forEach(card => {
                const title = card.querySelector('h3').innerText.toLowerCase();
                if(title.includes(term)) {
                    card.style.display = 'block';
                    anyVisibleInCat = true;
                } else {
                    card.style.display = 'none';
                }
            });

            // Se estiver buscando, mostra a categoria se houver resultados
            if(term !== "") {
                cat.style.display = anyVisibleInCat ? 'contents' : 'none';
            } else {
                // Se busca vazia, volta ao comportamento normal das abas
                const activeBtn = document.querySelector('.tab-btn.active').dataset.category;
                cat.style.display = cat.classList.contains(activeBtn) ? 'contents' : 'none';
            }
        });
    });
</script>

</body>
</html>
